<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برنامه پاس نگهبانی 31 روزه</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <header class="hero">

            <div>
                <h1>
                    برنامه پاس نگهبانی 31 روزه
                </h1>


            </div>
            <div class="date-box">



                <strong id="startDate"></strong>

            </div>
        </header>


        <!-- جدول افراد -->
        <!-- راهنمای ضریب -->

        <section class="card">

            <h2>افسر جانشین </h2>
            <div class="person-tools">

                <input type="text" id="newPersonName" placeholder="نام افسر جانشین">

                <button id="addPersonBtn" type="button">

                    افزودن افسر جانشین

                </button>

            </div>

            <div class="table-responsive">

                <table class="score-table">

                    <thead>

                        <tr>

                            <th>ردیف</th>

                            <th>نام و نام خانوادگی</th>

                            <th>امتیاز</th>



                            <th>جایگزین</th>

                            <th>عملیات</th>

                        </tr>

                    </thead>

                    <tbody id="chiefTable">

                    </tbody>

                </table>
            </div>
        </section>
        <section class="card">

            <h2>افسر سر</h2>

            <div class="person-tools">

                <input type="text" id="newGuardName" placeholder="نام افسر سر">

                <button id="addGuardBtn" type="button">

                    افزودن افسر سر

                </button>

            </div>
            <div class="table-responsive">
                <table class="score-table">

                    <thead>

                        <tr>

                            <th>ردیف</th>

                            <th>نام و نام خانوادگی</th>

                            <th>امتیاز</th>


                            <th>جایگزین</th>

                            <th>عملیات</th>

                        </tr>

                    </thead>

                    <tbody id="guardTable">

                    </tbody>

                </table>
            </div>
        </section>
        <section class="card">

            <h2> افسر پاسدار</h2>

            <div class="person-tools">

                <input type="text" id="newNightName" placeholder="نام   افسر پاسدار">

                <button id="addNightBtn" type="button">

                    افزودن افسر پاسدار

                </button>

            </div>
            <div class="table-responsive">
                <table class="score-table">

                    <thead>

                        <tr>

                            <th>ردیف</th>

                            <th>نام و نام خانوادگی</th>

                            <th>امتیاز</th>



                            <th>جایگزین</th>

                            <th>عملیات</th>

                        </tr>

                    </thead>

                    <tbody id="nightTable">

                    </tbody>

                </table>
            </div>
        </section>
        <section class="card">

            <h2>لیست نیروهای جایگزین</h2>

            <div class="person-tools">

                <input type="text" id="newReserveName" placeholder="نام نیروی جایگزین">
               <select id="newReserveRole" class="reserve-role-select">
                    <option value="chief">افسر جانشین</option>
                    <option value="guard">افسر سر</option>
                    <option value="night">افسر پاسدار</option>
                </select>
                <button id="addReserveBtn" type="button">

                    افزودن نیروی جایگزین

                </button>

            </div>
            <div class="table-responsive">
                <table class="score-table">

                    <thead>

                        <tr>

                            <th>ردیف</th>

                            <th>نام</th>

                            <th>سمت</th>

                            <th>عملیات</th>

                        </tr>

                    </thead>

                    <tbody id="reserveTable">

                    </tbody>

                </table>
            </div>
        </section>
        <!-- دکمه ها -->

        <section class="actions">

            <button id="generateBtn" type="button">
                ایجاد برنامه
            </button>

            <button id="pdfBtn" type="button">
                دانلود PDF
            </button>

            <button id="exportDataBtn" type="button">
                خروجی اطلاعات
            </button>

            <button id="importDataBtn" type="button">
                ورود اطلاعات
            </button>

            <input type="file" id="importFile" accept=".json" hidden>

        </section>


        <!-- برنامه -->

        <section class="card">

            <h2>برنامه نگهبانی</h2>

            <div id="scheduleContainer"></div>

        </section>
        <section class="card">
            <div class="fairness-box">

                <div class="section-header">

                    <h2>گزارش عدالت برنامه</h2>

                    <button id="fairnessPdfBtn" onclick="downloadFairnessPDF()">

                        📄 دانلود PDF

                    </button>

                </div>

                <div class="table-wrapper">

                    <div id="fairnessContainer"></div>

                </div>

            </div>
        </section>

        <!-- <section class="card">

            <h2>آمار</h2>

            <div id="statsContainer"></div>

        </section>  -->
        <div id="toastContainer"></div>
        <div class="modal-overlay" id="modalOverlay">

            <div class="modal">

                <div class="modal-header">

                    <h3 id="modalTitle"></h3>

                </div>

                <div class="modal-body">

                    <p id="modalMessage"></p>

                    <input type="text" id="modalInput" autocomplete="off">
                    <select id="modalSelect">

                    </select>

                </div>

                <div class="modal-footer">

                    <button id="modalCancelBtn" class="btn-secondary">

                        انصراف

                    </button>

                    <button id="modalConfirmBtn" class="btn-primary">

                        تایید

                    </button>

                </div>

            </div>

        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script src="app.js"></script>
    <script src="calender.js"></script>
    <script src="scheduler.js"></script>
    <script src="pdf.js"></script>
    <script src="backup.js"></script>


</body>

</html>
